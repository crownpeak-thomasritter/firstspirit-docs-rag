# FirstSpirit Docs RAG — local + single-host docker stack.
#
# Single FastAPI+frontend container backed by SQLite (chat + metadata) and
# Qdrant Cloud (vectors, server-side hybrid retrieval). Compose-level vars
# come from `deploy/.env` — copy `deploy/.env.example` and fill it in before
# `up`.
#
# Run from the repo root:
#     docker compose -f deploy/docker-compose.yml up -d --build
#
# Then visit http://localhost:8000.

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: firstspirit-docs-rag:latest
    container_name: firstspirit-docs-rag-app
    restart: unless-stopped
    environment:
      # --- LLM / embeddings ------------------------------------------------
      # Provider selection. Values: "openrouter" | "openai".
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openrouter}
      # Either OPENROUTER_API_KEY or OPENAI_API_KEY is required depending on
      # the active providers above. Neither is forced at compose time so
      # operators can pick the right one without setting a dummy.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      CHAT_MODEL: ${CHAT_MODEL:-anthropic/claude-sonnet-4.6}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-}

      # --- Vector store (Qdrant Cloud) ------------------------------------
      QDRANT_URL: ${QDRANT_URL:?QDRANT_URL must be set in deploy/.env}
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY must be set in deploy/.env}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-firstspirit_docs}

      # --- Database (SQLite) -----------------------------------------------
      # Path uses four slashes: three for the scheme + one for the absolute path.
      DATABASE_URL: sqlite+aiosqlite:////app/data/app.db

      # --- FastEmbed cache (BM25 model download) --------------------------
      # Persist the ~30MB ONNX BM25 model so it isn't re-downloaded every restart.
      FASTEMBED_CACHE_PATH: /app/data/fastembed-cache

      # --- RAG tuning (all optional with sensible defaults) ----------------
      RETRIEVAL_EXPANSION_WINDOW: ${RETRIEVAL_EXPANSION_WINDOW:-1}
      RETRIEVAL_MAX_PER_DOCUMENT: ${RETRIEVAL_MAX_PER_DOCUMENT:-3}
      CITATIONS_MAX_COUNT: ${CITATIONS_MAX_COUNT:-10}
      LLM_TOOLS_ENABLED: ${LLM_TOOLS_ENABLED:-true}
      LLM_TOOLS_MAX_PER_TURN: ${LLM_TOOLS_MAX_PER_TURN:-6}
      DOCUMENT_TOOL_MAX_CHARS: ${DOCUMENT_TOOL_MAX_CHARS:-120000}
      CATALOG_ENABLED: ${CATALOG_ENABLED:-false}
      CATALOG_TIER: ${CATALOG_TIER:-standard}
      CATALOG_CACHE_TTL_SECONDS: ${CATALOG_CACHE_TTL_SECONDS:-3600}

      # --- Ingestion -------------------------------------------------------
      # Inside the container these paths are fixed; the host-side bind
      # mounts below decide what actually lives there. SOURCE_VAULT_PATH is
      # left blank by default — the vault mount is optional.
      SOURCE_URL_LIST_PATH: "/app/sources/URL List.md"
      SOURCE_VAULT_PATH: "${SOURCE_VAULT_PATH_IN_CONTAINER:-}"
      CRAWLER_USER_AGENT: "${CRAWLER_USER_AGENT:-FirstSpiritDocsRAG/1.0 (+contact: you@example.com)}"
      CRAWLER_REQUEST_DELAY_MS: ${CRAWLER_REQUEST_DELAY_MS:-500}
      CRAWLER_MAX_RETRIES: ${CRAWLER_MAX_RETRIES:-4}
      CRAWLER_TIMEOUT_SECONDS: ${CRAWLER_TIMEOUT_SECONDS:-30.0}
      DEFAULT_SOURCE_TYPE: ${DEFAULT_SOURCE_TYPE:-firstspirit}

      # --- HTTP / CORS -----------------------------------------------------
      # When the bundled frontend is served from the same origin, no CORS
      # headers are needed at all. Override only if you point a separate
      # frontend at this backend.
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}"
      FRONTEND_DIST: /app/frontend/dist
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    volumes:
      - sqlite_data:/app/data
      # URL list: a single markdown file with one URL per line. The default
      # path resolves to deploy/sources/ inside the repo, which we ship with
      # a placeholder so the mount always exists.
      - ${URL_LIST_HOST_PATH:-./sources}:/app/sources:ro
      # Vault (optional). Default points at deploy/sources/empty-vault, which
      # the repo ships empty so the mount succeeds even when no vault is
      # configured. Override VAULT_HOST_PATH in .env to point at your own
      # Obsidian directory, and set SOURCE_VAULT_PATH_IN_CONTAINER=/app/vault
      # so the ingester actually reads it.
      - ${VAULT_HOST_PATH:-./sources/empty-vault}:/app/vault:ro
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status == 200 else 1)"
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  sqlite_data:
